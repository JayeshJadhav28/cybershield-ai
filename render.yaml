services:
  - type: web
    name: cybershield-api
    runtime: python
    region: singapore  # closest to India
    plan: free
    buildCommand: |
      cd apps/api-gateway
      pip install -r requirements.txt
    startCommand: |
      cd apps/api-gateway
      bash render_start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cybershield-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://your-app.vercel.app"]'
      - key: MODEL_DIR
        value: ./models
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: PYTHONPATH
        value: /opt/render/project/src/apps/api-gateway

databases:
  - name: cybershield-db
    plan: free
    region: singapore