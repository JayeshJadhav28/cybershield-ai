version: '3.9'

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://api:8000}/api/v1

  api:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-["https://cybershield.ai"]}
      - MODEL_DIR=/app/models
      - UPLOAD_DIR=/tmp/cybershield_uploads
    volumes:
      - ../models:/app/models:ro
      - uploads:/tmp/cybershield_uploads

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  uploads: